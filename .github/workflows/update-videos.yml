name: Update YouTube Videos

on:
  schedule:
    # Runs daily at 6 AM ET (11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  update-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch YouTube videos
        run: node scripts/fetch-youtube.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/videos.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/videos.json
          git commit -m "chore: update YouTube videos data"
          git push
